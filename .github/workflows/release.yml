name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      studio_tagged: ${{ steps.studio-release.outputs.studio_tagged }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Test
        run: yarn test

      - name: Detect an intentional Studio version bump
        id: studio-version
        shell: bash
        run: |
          before="${{ github.event.before }}"
          if ! git cat-file -e "${before}:packages/studio/package.json" 2>/dev/null; then
            current="$(node -p "require('./packages/studio/package.json').version")"
            echo "version=$current" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          previous="$(git show "${before}:packages/studio/package.json" | node -e "let data=''; process.stdin.on('data', chunk => data += chunk); process.stdin.on('end', () => process.stdout.write(JSON.parse(data).version))")"
          current="$(node -p "require('./packages/studio/package.json').version")"
          if [ "$previous" != "$current" ]; then
            echo "version=$current" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: yarn release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Studio tag and GitHub release
        id: studio-release
        if: steps.studio-version.outputs.version != ''
        run: node scripts/publish.mjs --studio-only
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STUDIO_RELEASE_VERSION: ${{ steps.studio-version.outputs.version }}

  package-studio:
    needs: release
    if: needs.release.outputs.studio_tagged != ''
    uses: ./.github/workflows/package-studio.yml
    with:
      studio_version: ${{ needs.release.outputs.studio_tagged }}
      platform: both
    secrets: inherit
