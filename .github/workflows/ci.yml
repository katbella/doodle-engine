name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Typecheck Studio
        run: yarn typecheck

      - name: Test with coverage
        run: yarn test:coverage

  studio-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build packages
        run: yarn build

      - name: Studio end-to-end
        run: xvfb-run --auto-servernum yarn workspace @doodle-engine/studio test:e2e:run

  studio-platform-tests:
    name: Studio tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Test Studio
        run: yarn workspace @doodle-engine/studio test

  verify:
    if: always()
    needs: [checks, studio-e2e, studio-platform-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Confirm all CI jobs passed
        env:
          CHECKS_RESULT: ${{ needs.checks.result }}
          STUDIO_E2E_RESULT: ${{ needs.studio-e2e.result }}
          STUDIO_PLATFORM_RESULT: ${{ needs.studio-platform-tests.result }}
        run: |
          test "$CHECKS_RESULT" = "success"
          test "$STUDIO_E2E_RESULT" = "success"
          test "$STUDIO_PLATFORM_RESULT" = "success"
